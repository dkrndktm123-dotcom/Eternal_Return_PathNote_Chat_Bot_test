<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ER Patch Arcade</title>
  <style>
    :root{--bg:#050816;--bg2:#0b1030;--bg3:#180926;--text:#f5f7ff;--muted:#a8b0d8;--pink:#ff4db8;--violet:#a855f7;--cyan:#4de3ff}
    *{box-sizing:border-box}html,body{margin:0;padding:0}
    body{min-height:100vh;color:var(--text);font-family:Inter,Pretendard,"Noto Sans KR",sans-serif;background:
      radial-gradient(circle at 20% 15%, rgba(255,77,184,.18), transparent 26%),
      radial-gradient(circle at 84% 22%, rgba(77,227,255,.14), transparent 22%),
      radial-gradient(circle at 72% 82%, rgba(168,85,247,.22), transparent 26%),
      linear-gradient(135deg,var(--bg),var(--bg2) 55%,var(--bg3))}
    .wrap{max-width:1480px;margin:24px auto;padding:0 18px}
    .shell{border-radius:28px;overflow:hidden;border:1px solid rgba(255,255,255,.08);background:rgba(4,7,21,.55);box-shadow:0 20px 60px rgba(0,0,0,.35)}
    .topnav{display:grid;grid-template-columns:340px 1fr;min-height:78px;border-bottom:1px solid rgba(255,255,255,.08);background:linear-gradient(180deg, rgba(10,12,32,.96), rgba(10,10,28,.92))}
    .brand{display:flex;align-items:center;gap:14px;padding:18px 22px;border-right:1px solid rgba(255,255,255,.06)}
    .brand-icon{ width:56px;height:56px;border-radius:14px;overflow:hidden; display:flex;align-items:center; justify-content:center; background:linear-gradient(135deg, rgba(255,77,184,.18), rgba(77,227,255,.12));}
    .brand-icon img{width:100%; height:100%; object-fit:contain;display:block;}
    .brand-title{font-size:22px;font-weight:900;background:linear-gradient(90deg,#84f5ff,#ff74ca 45%,#c28cff 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
    .content{display:grid;grid-template-columns:420px 1fr;min-height:860px}
    .left{padding:26px 22px 22px;border-right:1px solid rgba(255,255,255,.06);background:linear-gradient(180deg, rgba(14,8,35,.92), rgba(7,13,35,.96))}
    .mascot-panel{
        height:620px;
        border-radius:28px;
        border:1px solid rgba(255,255,255,.08);
        overflow:hidden;
        background:linear-gradient(160deg, #15103b, #091230);
        display:flex;
        align-items:center;
        justify-content:center;
        padding:12px;
      }

     .mascot-panel img{
        width:100%;
        height:100%;
        object-fit:contain;
        display:block;
      }
    .quick-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:16px}
    .quick-grid button,.recommended button{min-height:76px;border-radius:18px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:#f2f5ff;font-weight:800;cursor:pointer}
    .recent-box{margin-top:18px;border-radius:22px;border:1px solid rgba(255,255,255,.08);background:rgba(5,9,24,.72);padding:16px}
    .patch-row{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:12px;padding:12px 14px;border-radius:16px;background:rgba(255,255,255,.03);margin-top:8px}
    .right{padding:24px;display:grid;grid-template-rows:auto 1fr;gap:18px;background:linear-gradient(180deg, rgba(5,8,24,.92), rgba(5,10,28,.95))}
    .hero-card,.block{border-radius:24px;border:1px solid rgba(255,255,255,.08);background:rgba(6,10,28,.9);padding:18px}
    .hero-card{border-color:rgba(255,77,184,.18);box-shadow:0 0 28px rgba(255,77,184,.08)}
    .hero-card h1{margin:0 0 6px;font-size:52px;line-height:.98}
    .hero-card p{margin:0 0 18px;color:var(--muted)}
    .hero-search{display:flex;gap:12px}.hero-search input{flex:1;height:62px;background:#f6f7fc;color:#15182b;font-size:18px;border:0;border-radius:18px;padding:0 20px;outline:none}
    .hero-search button{width:72px;border:0;border-radius:18px;background:linear-gradient(135deg,#ff5aae,#ff4db8);font-size:28px;color:#fff;cursor:pointer}
    .recommended{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}.recommended button{min-height:auto;padding:10px 14px;border-radius:999px}
    .dashboard{display:grid;grid-template-columns:1.25fr .75fr;gap:18px}
    .answer{min-height:420px;overflow:auto}
    .bubble{position:relative;padding:22px 24px;border-radius:28px;background:linear-gradient(135deg, rgba(22,12,48,.98), rgba(9,18,48,.96));border:1px solid rgba(255,255,255,.08)}
    .bubble::before{content:"";position:absolute;left:-12px;top:24px;width:26px;height:26px;background:linear-gradient(135deg, rgba(168,85,247,.9), rgba(255,77,184,.9));clip-path:polygon(100% 0,0 50%,100% 100%)}
    .bubble::after{content:"🐱";position:absolute;left:-34px;top:-8px;font-size:22px}
    .gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:16px}
    .img-box{border-radius:20px;background:rgba(2,6,18,.9);border:1px solid rgba(255,255,255,.08);padding:10px;min-height:220px;display:flex;align-items:center;justify-content:center}
    .gallery img{width:100%;max-height:320px;object-fit:contain;border-radius:14px;display:block}
    .line{white-space:pre-wrap;line-height:1.8}
    .statusbox{font-size:18px;font-weight:800;margin-bottom:14px}
    .status{color:#a8b0d8;margin-bottom:18px}
    .rank-item{display:grid;grid-template-columns:40px 1fr;gap:12px;align-items:center;padding:12px;border-radius:16px;background:rgba(255,255,255,.03);margin-top:10px}
    .rank-no{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:linear-gradient(135deg,#6b2dff,#ff4db8);font-weight:900}
    @media (max-width:1200px){.content{grid-template-columns:1fr}.topnav{grid-template-columns:1fr}.brand{border-right:0}}
    @media (max-width:900px){.dashboard{grid-template-columns:1fr}.hero-card h1{font-size:38px}.hero-search{flex-direction:column}.hero-search button{width:100%;height:58px}}
  </style>
</head>
<body>
<div class="wrap"><div class="shell">
<header class="topnav">
  <div class="brand-icon">
  <img src="./assets/nia_ui_icon.png" alt="nia icon">
</div>
</header>
<section class="content">
  <aside class="left">
    <div class="mascot-panel"> <img src="./assets/nia_left_panel.png" alt="nia left panel"></div>
    <div class="quick-grid">
      <button class="quick" data-q="캐릭터">캐릭터</button><button class="quick" data-q="무기 스킬">무기 스킬</button>
      <button class="quick" data-q="스킨">스킨</button><button class="quick" data-q="이모티콘">이모티콘</button>
      <button class="quick" data-q="방어구">방어구</button><button class="quick" data-q="코발트 프로토콜">코발트 프로토콜</button>
      <button class="quick" data-q="시스템">시스템</button><button class="quick" data-q="매치메이킹">매치메이킹</button>
    </div>
    <div class="recent-box">
      <div style="font-size:24px;font-weight:800">최근 패치</div>
      <div class="patch-row"><div>10.7c</div><div>핫픽스</div><div>2026.04.16</div></div>
      <div class="patch-row"><div>10.7b</div><div>핫픽스</div><div>2026.04.16</div></div>
      <div class="patch-row"><div>10.7</div><div>정규 업데이트</div><div>2026.04.02</div></div>
    </div>
  </aside>

  <main class="right">
    <section class="hero-card">
      <h1>이터널 리턴 패치 검색</h1>
      <p>궁금한 패치 내용을 검색해보세요!</p>
      <div class="hero-search"><input id="heroInput" placeholder="검색어를 입력하세요... (예: 마이, 무기 스킬, 스킨)"><button id="heroBtn">⌕</button></div>
      <div class="recommended">
        <button class="quick" data-q="마이">마이</button><button class="quick" data-q="무기 스킬">무기 스킬</button>
        <button class="quick" data-q="스킨">스킨</button><button class="quick" data-q="이모티콘">이모티콘</button>
        <button class="quick" data-q="방어구">방어구</button><button class="quick" data-q="코발트 프로토콜">코발트 프로토콜</button>
      </div>
    </section>
    <section class="dashboard">
      <div class="block">
        <div style="font-size:28px;font-weight:800;margin-bottom:14px">응답 결과</div>
        <div id="answer" class="answer"><div class="bubble"><div class="line">질문 예시:
"마이는 어떤 버프를 받았어?"
"무기 스킬"
"스킨"
"이모티콘"</div></div></div>
      </div>
      <div class="block">
        <div class="statusbox">상태</div>
        <div id="status" class="status">패치노트를 불러오고 질문을 입력해 주세요.</div>
        <div class="rank-item"><div class="rank-no">1</div><div>마이</div></div>
        <div class="rank-item"><div class="rank-no">2</div><div>무기 스킬</div></div>
        <div class="rank-item"><div class="rank-no">3</div><div>스킨</div></div>
        <div class="rank-item"><div class="rank-no">4</div><div>실비아</div></div>
        <div class="rank-item"><div class="rank-no">5</div><div>혜진</div></div>
      </div>
    </section>
  </main>
</section>
</div></div>

<script>
const BASE_URL = "http://127.0.0.1:8000";
const h = document.getElementById("heroInput");
const statusEl = document.getElementById("status");
const answerEl = document.getElementById("answer");

function esc(s){return s.replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");}
function setStatus(t){statusEl.textContent=t;}

function renderAnswer(text){
  const imageRegex = /IMAGE:\s*(https?:\/\/[^\s]+)/g;
  const images = [...text.matchAll(imageRegex)].map(m => m[1]);
  const textOnly = text.replace(imageRegex, "").trim();
  const lines = textOnly.split("\\n");
  const gallery = images.length ? `<div class="gallery">${images.map(src => `<div class="img-box"><img src="${esc(src)}" alt="patch image"></div>`).join("")}</div>` : "";
  answerEl.innerHTML = `<div class="bubble">${gallery}${lines.map(x => `<div class="line">${esc(x)}</div>`).join("")}</div>`;
}

async function ingest(){
  setStatus("최신 패치노트를 불러오는 중입니다...");
  try{
    const res = await fetch(`${BASE_URL}/ingest?limit=3`, {method:"POST"});
    const data = await res.json();
    if(!res.ok) throw new Error(data.detail || "ingest 실패");
    setStatus(`최신 패치노트 ${data.count}개 chunk를 불러왔습니다.`);
  }catch(err){ setStatus(`실패: ${err.message}`); }
}

async function ask(preset = null){
  const query = (preset || h.value).trim();
  if(!query) return;
  h.value = query;
  setStatus(`"${query}" 검색 중입니다...`);
  try{
    const res = await fetch(`${BASE_URL}/ask?q=${encodeURIComponent(query)}`, {method:"POST"});
    const data = await res.json();
    if(!res.ok) throw new Error(data.detail || "ask 실패");
    renderAnswer(data.answer || "응답이 없습니다.");
    setStatus(`"${query}" 검색이 완료되었습니다.`);
  }catch(err){
    renderAnswer(`오류가 발생했습니다.\n${err.message}`);
    setStatus("오류");
  }
}
document.getElementById("heroBtn").onclick = () => ask();
h.addEventListener("keydown", e => { if(e.key === "Enter") ask(); });
document.querySelectorAll(".quick").forEach(btn => btn.onclick = () => ask(btn.dataset.q));
</script>
</body>
</html>
